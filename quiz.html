<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Health Risk Quiz | Mims Express Labs</title>

<style>

body{
font-family:Arial;
background:#f4f8fb;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:40px;
}

.quiz-box{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#3f8ecb;
}

button{
background:#3f8ecb;
color:white;
border:none;
padding:12px 25px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

.question{
margin-top:20px;
}

.result{
display:none;
margin-top:30px;
background:#eaf3fb;
padding:20px;
border-radius:6px;
}

.panel{
font-weight:bold;
font-size:20px;
color:#3f8ecb;
}

</style>

</head>

<body>

<header>

<nav>

<a href="index.html">Home</a>

</nav>

</header>

<div class="container">

<div class="quiz-box">

<h1>Health Risk Screening Quiz</h1>

<p>Answer a few questions to see which preventive lab panel is recommended.</p>

<div class="question">

<label>1. What is your age group?</label><br>

<select id="age">

<option value="0">Under 30</option>
<option value="1">30-40</option>
<option value="2">41-50</option>
<option value="3">51-60</option>
<option value="4">60+</option>

</select>

</div>

<div class="question">

<label>2. Do you have a family history of diabetes?</label><br>

<select id="diabetes">

<option value="0">No</option>
<option value="2">Yes</option>

</select>

</div>

<div class="question">

<label>3. Do you have high blood pressure?</label><br>

<select id="pressure">

<option value="0">No</option>
<option value="2">Yes</option>

</select>

</div>

<div class="question">

<label>4. Have you experienced fatigue or frequent urination?</label><br>

<select id="symptoms">

<option value="0">No</option>
<option value="2">Yes</option>

</select>

</div>

<div class="question">

<label>5. Do you have a family history of cancer?</label><br>

<select id="cancer">

<option value="0">No</option>
<option value="2">Yes</option>

</select>

</div>

<button onclick="calculateRisk()">See My Results</button>

<div class="result" id="resultBox">

<h2>Your Recommended Panel</h2>

<p class="panel" id="panelResult"></p>

<p id="panelPrice"></p>

<button onclick="goToBooking()">Schedule My Test</button>

</div>

</div>

</div>

<script>

function calculateRisk(){

let score = 0;

score += parseInt(document.getElementById("age").value);
score += parseInt(document.getElementById("diabetes").value);
score += parseInt(document.getElementById("pressure").value);
score += parseInt(document.getElementById("symptoms").value);
score += parseInt(document.getElementById("cancer").value);

let panel = "";
let price = "";

if(score >= 6){

panel = "Comprehensive Wellness Panel";
price = "$249";

}

else if(score >=4){

panel = "Diabetes Prevention Panel";
price = "$149";

}

else if(score >=2){

panel = "Heart Health Panel";
price = "$159";

}

else{

panel = "Basic Wellness Panel";
price = "$129";

}

document.getElementById("panelResult").innerText = panel;
document.getElementById("panelPrice").innerText = "Estimated Price: " + price;

document.getElementById("resultBox").style.display = "block";

localStorage.setItem("selectedPanel", panel);

}

function goToBooking(){

window.location.href = "booking.html";

}

</script>

</body>

</html>
